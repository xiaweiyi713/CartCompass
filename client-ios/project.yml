name: ShopGuide
options:
  bundleIdPrefix: com.challenge
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ShopGuide:
    type: application
    platform: iOS
    sources:
      - ShopGuide
    settings:
      base:
        PRODUCT_NAME: CartCompass
        PRODUCT_BUNDLE_IDENTIFIER: com.challenge.CartCompass
        INFOPLIST_KEY_CFBundleDisplayName: 智购罗盘
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_SHOPGUIDE_API_BASE_URL: http://127.0.0.1:8000
        INFOPLIST_KEY_NSCameraUsageDescription: 用于拍摄实物图片，帮助智能导购检索相似商品。
        INFOPLIST_KEY_NSMicrophoneUsageDescription: 用于把你的语音需求转成文字导购请求。
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 用于选择商品图片，帮助智能导购检索相似商品。
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: 用于识别你的语音导购需求并填入输入框。
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: ShopGuide/Resources/Info.plist
      properties:
        CFBundleDisplayName: 智购罗盘
        UILaunchScreen: {}
        SHOPGUIDE_API_BASE_URL: http://127.0.0.1:8000
        NSAppTransportSecurity:
          NSExceptionDomains:
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
              NSTemporaryExceptionAllowsInsecureHTTPLoads: true
